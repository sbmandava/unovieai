<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 980 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="sans-serif"><style>:root,svg{--card:#ffffff;--card-2:#eef2f7;--band:#e9eef5;--text:#1b2733;--muted:#5b6b7b;--border:#cdd6e0;--accent:#2f6fed;--accent-soft:#e7f0ff;--green:#1f9d57;--green-soft:#e3f7ec;--warn:#c2410c;--warn-soft:#fbe9df;--line:#8aa0b6} @media (prefers-color-scheme:dark){:root,svg{--card:#1a222c;--card-2:#222d3a;--band:#172029;--text:#e6edf3;--muted:#9bb0c3;--border:#33414f;--accent:#5a8bff;--accent-soft:#16263f;--green:#3ad07f;--green-soft:#11301f;--warn:#f2913d;--warn-soft:#2e2113;--line:#6b86a3}} .d-card{fill:var(--card);stroke:var(--border);stroke-width:1.3}
.d-card2{fill:var(--card-2);stroke:var(--border);stroke-width:1.3}
.d-band{fill:var(--band);stroke:var(--border);stroke-width:1.3}
.d-accentbox{fill:var(--accent-soft);stroke:var(--accent);stroke-width:1.4}
.d-greenbox{fill:var(--green-soft);stroke:var(--green);stroke-width:1.4}
.d-warnbox{fill:var(--warn-soft);stroke:var(--warn);stroke-width:1.4}
.d-text{fill:var(--text)}
.d-muted{fill:var(--muted)}
.d-line{stroke:var(--line);stroke-width:1.7;fill:none}
.d-dash{stroke:var(--line);stroke-width:1.5;stroke-dasharray:6 4;fill:none}
.d-arrow{fill:var(--line)}
svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
</style><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="d-arrow"/></marker></defs><text class="d-muted" x="24.0" y="28.0" font-size="14.0" font-weight="600" text-anchor="start">ASMM-Med maturity — capability rises with assurance</text><rect class="d-warnbox" x="24" y="386" width="150" height="58" rx="8"/><text class="d-text" x="36.0" y="410.0" font-size="16.0" font-weight="800" text-anchor="start">L0</text><text class="d-text" x="36.0" y="427.0" font-size="11.5" font-weight="600" text-anchor="start">Ad-hoc</text><text class="d-muted" x="36.0" y="444.0" font-size="10.0" font-weight="400" text-anchor="start">Suggestions only</text><rect class="d-card" x="178" y="328" width="150" height="116" rx="8"/><text class="d-text" x="190.0" y="352.0" font-size="16.0" font-weight="800" text-anchor="start">L1</text><text class="d-text" x="190.0" y="369.0" font-size="11.5" font-weight="600" text-anchor="start">Governed</text><text class="d-muted" x="190.0" y="386.0" font-size="10.0" font-weight="400" text-anchor="start">Inline completion</text><rect class="d-card2" x="332" y="270" width="150" height="174" rx="8"/><text class="d-text" x="344.0" y="294.0" font-size="16.0" font-weight="800" text-anchor="start">L2</text><text class="d-text" x="344.0" y="311.0" font-size="11.5" font-weight="600" text-anchor="start">Spec-Driven</text><text class="d-muted" x="344.0" y="328.0" font-size="10.0" font-weight="400" text-anchor="start">Single-step</text><text class="d-muted" x="344.0" y="341.0" font-size="10.0" font-weight="400" text-anchor="start">full review</text><rect class="d-accentbox" x="486" y="212" width="150" height="232" rx="8"/><text class="d-text" x="498.0" y="236.0" font-size="16.0" font-weight="800" text-anchor="start">L3</text><text class="d-text" x="498.0" y="253.0" font-size="11.5" font-weight="600" text-anchor="start">Orchestrated</text><text class="d-muted" x="498.0" y="270.0" font-size="10.0" font-weight="400" text-anchor="start">Multi-step</text><text class="d-muted" x="498.0" y="283.0" font-size="10.0" font-weight="400" text-anchor="start">HITL gates</text><rect class="d-greenbox" x="640" y="154" width="150" height="290" rx="8"/><text class="d-text" x="652.0" y="178.0" font-size="16.0" font-weight="800" text-anchor="start">L4</text><text class="d-text" x="652.0" y="195.0" font-size="11.5" font-weight="600" text-anchor="start">Validated Autonomous</text><text class="d-muted" x="652.0" y="212.0" font-size="10.0" font-weight="400" text-anchor="start">Autonomous within</text><text class="d-muted" x="652.0" y="225.0" font-size="10.0" font-weight="400" text-anchor="start">validated bounds</text><rect class="d-accentbox" x="794" y="96" width="150" height="348" rx="8"/><text class="d-text" x="806.0" y="120.0" font-size="16.0" font-weight="800" text-anchor="start">L5</text><text class="d-text" x="806.0" y="137.0" font-size="11.5" font-weight="600" text-anchor="start">Self-Optimizing</text><text class="d-muted" x="806.0" y="154.0" font-size="10.0" font-weight="400" text-anchor="start">Closed-loop</text><text class="d-muted" x="806.0" y="167.0" font-size="10.0" font-weight="400" text-anchor="start">PCCP-governed</text><path class="d-line" d="M174.0,386.0 L178.0,328.0" marker-end="url(#arr)"/><path class="d-line" d="M328.0,328.0 L332.0,270.0" marker-end="url(#arr)"/><path class="d-line" d="M482.0,270.0 L486.0,212.0" marker-end="url(#arr)"/><path class="d-line" d="M636.0,212.0 L640.0,154.0" marker-end="url(#arr)"/><path class="d-line" d="M790.0,154.0 L794.0,96.0" marker-end="url(#arr)"/><rect class="d-card" x="556" y="40" width="404" height="84" rx="10"/><text class="d-text" x="572.0" y="66.0" font-size="12.0" font-weight="500" text-anchor="start">Governing level = min(D1 Governance, D4 Evaluation,</text><text class="d-text" x="572.0" y="84.0" font-size="12.0" font-weight="500" text-anchor="start">D6 Security). Autonomy never outruns assurance.</text><text class="d-text" x="572.0" y="102.0" font-size="12.0" font-weight="500" text-anchor="start">Class C is always dual human control.</text></svg>