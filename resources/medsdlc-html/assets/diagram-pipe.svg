<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg" role="img" font-family="sans-serif"><style>:root,svg{--card:#ffffff;--card-2:#eef2f7;--band:#e9eef5;--text:#1b2733;--muted:#5b6b7b;--border:#cdd6e0;--accent:#2f6fed;--accent-soft:#e7f0ff;--green:#1f9d57;--green-soft:#e3f7ec;--warn:#c2410c;--warn-soft:#fbe9df;--line:#8aa0b6} @media (prefers-color-scheme:dark){:root,svg{--card:#1a222c;--card-2:#222d3a;--band:#172029;--text:#e6edf3;--muted:#9bb0c3;--border:#33414f;--accent:#5a8bff;--accent-soft:#16263f;--green:#3ad07f;--green-soft:#11301f;--warn:#f2913d;--warn-soft:#2e2113;--line:#6b86a3}} .d-card{fill:var(--card);stroke:var(--border);stroke-width:1.3}
.d-card2{fill:var(--card-2);stroke:var(--border);stroke-width:1.3}
.d-band{fill:var(--band);stroke:var(--border);stroke-width:1.3}
.d-accentbox{fill:var(--accent-soft);stroke:var(--accent);stroke-width:1.4}
.d-greenbox{fill:var(--green-soft);stroke:var(--green);stroke-width:1.4}
.d-warnbox{fill:var(--warn-soft);stroke:var(--warn);stroke-width:1.4}
.d-text{fill:var(--text)}
.d-muted{fill:var(--muted)}
.d-line{stroke:var(--line);stroke-width:1.7;fill:none}
.d-dash{stroke:var(--line);stroke-width:1.5;stroke-dasharray:6 4;fill:none}
.d-arrow{fill:var(--line)}
svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
</style><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="d-arrow"/></marker></defs><text class="d-muted" x="24.0" y="28.0" font-size="14.0" font-weight="600" text-anchor="start">The 99.9% release gate — Generate → Verify → Repair → Gate → Sign</text><rect class="d-card" x="24.0" y="110.0" width="120.0" height="74.0" rx="7"/><text class="d-text" x="84.0" y="143.6" font-size="12.5" font-weight="400" text-anchor="middle">Task + Spec</text><text class="d-text" x="84.0" y="159.1" font-size="12.5" font-weight="400" text-anchor="middle">BDD / Gherkin</text><rect class="d-accentbox" x="170.0" y="110.0" width="130.0" height="74.0" rx="7"/><text class="d-text" x="235.0" y="143.6" font-size="12.5" font-weight="400" text-anchor="middle">Model Fleet</text><text class="d-text" x="235.0" y="159.1" font-size="12.5" font-weight="400" text-anchor="middle">S / M / L / V</text><rect class="d-greenbox" x="326.0" y="110.0" width="174.0" height="74.0" rx="7"/><text class="d-text" x="413.0" y="143.6" font-size="12.5" font-weight="400" text-anchor="middle">Deterministic</text><text class="d-text" x="413.0" y="159.1" font-size="12.5" font-weight="400" text-anchor="middle">Verifiers</text><rect class="d-card" x="528.0" y="110.0" width="150.0" height="74.0" rx="7"/><text class="d-text" x="603.0" y="143.6" font-size="12.5" font-weight="400" text-anchor="middle">Eval Gate</text><text class="d-text" x="603.0" y="159.1" font-size="12.5" font-weight="400" text-anchor="middle">≥ 99.9%</text><rect class="d-card" x="706.0" y="110.0" width="140.0" height="74.0" rx="7"/><text class="d-text" x="776.0" y="143.6" font-size="12.5" font-weight="400" text-anchor="middle">HITL</text><text class="d-text" x="776.0" y="159.1" font-size="12.5" font-weight="400" text-anchor="middle">by safety class</text><rect class="d-card" x="874.0" y="110.0" width="102.0" height="74.0" rx="7"/><text class="d-text" x="92