<svg viewBox="0 0 1000 462" xmlns="http://www.w3.org/2000/svg" role="img" font-family="sans-serif"><style>:root,svg{--card:#ffffff;--card-2:#eef2f7;--band:#e9eef5;--text:#1b2733;--muted:#5b6b7b;--border:#cdd6e0;--accent:#2f6fed;--accent-soft:#e7f0ff;--green:#1f9d57;--green-soft:#e3f7ec;--warn:#c2410c;--warn-soft:#fbe9df;--line:#8aa0b6} @media (prefers-color-scheme:dark){:root,svg{--card:#1a222c;--card-2:#222d3a;--band:#172029;--text:#e6edf3;--muted:#9bb0c3;--border:#33414f;--accent:#5a8bff;--accent-soft:#16263f;--green:#3ad07f;--green-soft:#11301f;--warn:#f2913d;--warn-soft:#2e2113;--line:#6b86a3}} .d-card{fill:var(--card);stroke:var(--border);stroke-width:1.3}
